name: Feature / Change Request
description: Suggest a change that is still worth landing in the current closeout phase
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's missing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "Add a slider to control gravity strength..."
    validations:
      required: true

  - type: dropdown
    id: closeout-fit
    attributes:
      label: Why should this land now?
      description: This repository is being finished rather than expanded broadly.
      options:
        - It fixes correctness or stability
        - It improves repository quality or workflow
        - It improves project presentation or discoverability
        - It is optional and can wait
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
      placeholder: "I also thought about..."

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Physics/Simulation
        - Visual Effects
        - Performance
        - User Interface
        - Documentation
        - OpenSpec / workflow
        - GitHub Pages / project presentation
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: OpenSpec / Additional Context
      description: Add any spec impact, mockups, or examples.
