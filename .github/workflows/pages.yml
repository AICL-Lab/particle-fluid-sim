name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'index.html'
      - 'docs/**'
      - 'openspec/specs/**'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build demo
        run: VITE_BASE_PATH=/particle-fluid-sim/demo/ npm run build

      - name: Build VitePress site
        env:
          VITEPRESS_BASE: /particle-fluid-sim
        run: npm run docs:build

      - name: Copy demo to docs output
        run: |
          rm -rf docs/.vitepress/dist/demo
          cp -r dist/ docs/.vitepress/dist/demo/

      - name: Disable Jekyll
        run: touch docs/.vitepress/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/.vitepress/dist
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
