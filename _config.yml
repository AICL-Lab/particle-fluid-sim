# Jekyll Configuration for WebGPU Particle Fluid Simulation
# ============================================================================

# Site Settings
title: WebGPU Particle Fluid Simulation
description: >-
  High-performance particle fluid simulation using WebGPU compute shaders.
  Features adaptive quality scaling, persistent motion trails, and frame-rate independent physics.
author: LessUp
repository: LessUp/particle-fluid-sim
url: https://lessup.github.io
baseurl: /particle-fluid-sim
lang: en

# Build Settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# Collections
collections:
  docs:
    output: true
    permalink: /docs/:name/

# Default Values
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default

# Sass Configuration
sass:
  sass_dir: _sass
  style: compressed

# Assets
assets:
  sources:
    - assets/css
    - assets/js
    - assets/images

# SEO
twitter:
  username: LessUp
  card: summary_large_image

social:
  name: Particle Fluid Simulation
  links:
    - https://github.com/LessUp/particle-fluid-sim

# Navigation
navigation:
  main:
    - title: Home
      url: /
    - title: Documentation
      url: /docs/
      children:
        - title: API Reference
          url: /docs/API/
        - title: Performance
          url: /docs/PERFORMANCE/
        - title: Troubleshooting
          url: /docs/TROUBLESHOOTING/
    - title: Changelog
      url: /CHANGELOG/
    - title: Contributing
      url: /CONTRIBUTING/

# Exclude Files/Folders
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - node_modules
  - src
  - dist
  - coverage
  - package.json
  - package-lock.json
  - tsconfig.json
  - vite.config.ts
  - vitest.config.ts
  - eslint.config.js
  - index.html
  - .prettierrc
  - .prettierignore
  - .editorconfig
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.log"
  - scripts/
  - README.md
  - README.zh-CN.md
  - RELEASE_NOTES.md

# Include Files (specifically for Jekyll)
include:
  - _config.yml
  - .well-known

# GitHub Pages settings
github:
  is_project_page: true
  repository_url: https://github.com/LessUp/particle-fluid-sim

# WebPWA Settings
pwa:
  enabled: true
  name: WebGPU Sim
  short_name: WebGPU Sim
  theme_color: "#58a6ff"
  background_color: "#0d1117"
  display: standalone
  orientation: any

# Analytics (Placeholder - replace with actual tracking ID if needed)
# google_analytics: UA-XXXXXXXX-X

# Disqus (Placeholder - uncomment if needed)
# disqus:
#   shortname: your-disqus-shortname
